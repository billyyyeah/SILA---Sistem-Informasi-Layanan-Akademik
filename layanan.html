<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILA - Sistem Informasi Layanan Akademik</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://www.dafont.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="logo">🎓 SILA 𐚁</a>
            <input type="checkbox" id="navToggle" class="nav-toggle">
            <label for="navToggle" class="nav-toggle-menu">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="layanan.html" class="active">Ajukan Layanan</a></li>
                    <li><a href="riwayat.html">Riwayat</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1>Ajukan Layanan Akademik</h1>
                <p class="section-desc"><em>🚦Coming soon - Form pengajuan akan tersedia pada tahap berikutnya</em></p>
                <form action="#" method="post" target="_self" class="form-card">
                    <fieldset>
                        <legend>Data Pengajuan</legend>

                        <div class="form-group">
                            <label for="nama">Nama Lengkap</label>
                            <input type="text" id="namalengkap" name="namalengkap" placeholder="Masukkan nama Anda" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="nim">NIM</label>
                                <input type="text" id="nim" name="nim" placeholder="Contoh: 241120001" maxlength="9" required>
                            </div>
                            <div class="form-group">
                                <label for="prodi">Program Studi</label>
                                <select id="prodi" name="prodi" required>
                                    <option value="">-- Pilih Program Studi --</option>
                                    <option value="Teknik Informatika">Teknik Informatika</option>
                                    <option value="Sistem Informasi">Sistem Informasi</option>
                                    <option value="Teknologi Informasi">Teknologi Informasi</option>
                                    <option value="Manajemen">Manajemen</option>
                                    <option value="Akuntansi">Akuntansi</option>
                                    <option value="Hukum Bisnis">Hukum Bisnis</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="layanan">Jenis Layanan</label>
                                <select id="layanan" name="layanan" required>
                                    <option value="">-- Pilih Layanan --</option>
                                    <option value="SKA">SKA - Surat Aktif Kuliah</option>
                                    <option value="CAK">CAK - Cuti Akademik</option>
                                    <option value="TNM">TNM - Transkrip Nilai</option>
                                    <option value="PDA">Perubahan Data</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="tanggal">Tanggal Pengajuan</label>
                                <input type="date" id="tanggal" name="tanggal" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="keterangan">Keterangan (Opsional)</label>
                            <textarea id="keterangan" name="keterangan" rows="5" placeholder="Jelaskan alasan pengajuan Anda..."></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" name="submit" class="btn btn-primary">🚀 Ajukan Sekarang</button>
                            <button type="reset" name="reset" class="btn btn-outline">❗ Reset</button>
                        </div>
                        
                    </fieldset>
                </form>


                <a href="index.html" class="btn btn-outline">⬅ Kembali ke Beranda</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
        <p>&copy; 2026 SILA - Dibuat untuk tugas Pemrograman Web</p>
        </div>
    </footer>

</body>
</html>
